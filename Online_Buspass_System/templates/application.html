<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Bus Pass Application</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/application.css') }}"
    />
  </head>

  <body>
    <div class="container">
      <h1>New Bus Pass Application</h1>

      <form method="POST" action="/new-application">
        <label>Full Name</label>
        <input type="text" name="name" required />

        <label>Age</label>
        <input type="number" name="age" required />

        <label>Date of Birth</label>
        <input type="date" name="dob" required />

        <label>Gender</label>
        <select name="gender" required>
          <option value="" disabled selected>Select</option>
          <option>Male</option>
          <option>Female</option>
          <option>Other</option>
        </select>

        <label>Email</label>
        <input type="email" name="email" required />

        <label>Location</label>
        <input type="text" name="location" placeholder="City / Area" required />

        <label>Pass Type</label>
        <select name="pass_type" required>
          <option value="" disabled selected>Select</option>
          <option value="student">Student Pass</option>
          <option value="1000">₹1000 Pass</option>
        </select>

        <button type="submit">Submit Application</button>
      </form>
    </div>
  </body>
</html>
